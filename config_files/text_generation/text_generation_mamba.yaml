settings:
  referencing_keys:
    sample_key: input_ids
    prediction_key: logits
  model_path: /raid/s3/opengptx/alexj/llm_gym/modalities/modalities/data/checkpoints/eid_2024-05-13__08-10-18-model-num_steps_1670000.bin
  device: 0
  context_length: 2048

text_inference_component:
  component_key: inference_component
  variant_key: text
  config:
    device: ${settings.device}
    model:
      instance_key: checkpointed_model
      pass_type: BY_REFERENCE
    tokenizer:
      instance_key: tokenizer
      pass_type: BY_REFERENCE
    context_length: ${settings.context_length}
    eod_token: <eod>
    prompt_template: "{prompt_input}" # "<instruction> Du bist Moody, ein LLM welches Menschen helfen soll. user: {prompt_input}"
    temperature: 0
    # chat: false

checkpointed_model:
  component_key: model
  variant_key: checkpointed
  config: 
    checkpoint_loading:
      component_key: checkpoint_loading
      variant_key: torch
      config:
        device: ${settings.device}
        precision: FP16
    model:
      instance_key: raw_model
      pass_type: BY_REFERENCE
    checkpoint_path: ${settings.model_path}

raw_model:
  component_key: model
  variant_key: mamba
  config:
    d_model: 768
    n_layer: 24
    vocab_size: 50257
    rms_norm: true
    residual_in_fp32: true
    fused_add_norm: true
    pad_vocab_size_multiple: 8
    tie_embeddings: true
    prediction_key: ${settings.referencing_keys.prediction_key}
    sample_key: ${settings.referencing_keys.sample_key}
    seed: null
    dtype: null
    initializer_cfg: {}
    num_last_tokens: 0
    inference_params: {}
    mixer_model_config:
      norm_epsilon: 1e-5
      device: null
      mamba_block_config:
        d_state: 16
        d_conv: 4
        expand: 2
        dt_rank: auto
        dt_min: 0.001
        dt_max: 0.1
        dt_init: random
        dt_scale: 1.0
        dt_init_floor: 1e-4
        conv_bias: true
        bias: false
        use_fast_path: true

tokenizer:
  component_key: tokenizer
  variant_key: pretrained_hf_tokenizer
  config:
    pretrained_model_name_or_path: /raid/s3/opengptx/max_lue/modalities/data/tokenizer/hf_gpt2
    padding: false
    max_length: ${settings.context_length}